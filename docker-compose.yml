services:
  workbench:
    build:
      context: .
      target: runner
    ports:
      - "3000:3000"
    environment:
      NEXT_TELEMETRY_DISABLED: "1"
      WORKBENCH_DATA_FILE: /data/workbench.json
      WRANGLER_LOG_PATH: /tmp/wrangler.log
    volumes:
      - ../ai-workbench-data:/data
    init: true
