services:
  workbench:
    build:
      context: .
      target: runner
    ports:
      - "3000:3000"
    environment:
      NEXT_TELEMETRY_DISABLED: "1"
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.openai.com/v1}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4.1-mini}
      KIMI_CODING_API_KEY: ${KIMI_CODING_API_KEY:-}
      KIMI_CODING_USAGE_URL: ${KIMI_CODING_USAGE_URL:-https://api.kimi.com/coding/v1/usages}
      CODEX_ACCESS_TOKEN: ${CODEX_ACCESS_TOKEN:-}
      WORKBENCH_DATA_FILE: /data/workbench.json
      WRANGLER_LOG_PATH: /tmp/wrangler.log
    volumes:
      - ../ai-workbench-data:/data
    init: true
