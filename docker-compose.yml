services:
  workbench:
    build:
      context: .
      target: runner
    ports:
      - "3000:3000"
    environment:
      NEXT_TELEMETRY_DISABLED: "1"
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.openai.com/v1}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4.1-mini}
      OPENAI_ADMIN_KEY: ${OPENAI_ADMIN_KEY:-}
      OPENAI_USAGE_DAYS: ${OPENAI_USAGE_DAYS:-30}
      KIMI_API_KEY: ${KIMI_API_KEY:-}
      KIMI_BALANCE_BASE_URL: ${KIMI_BALANCE_BASE_URL:-https://api.moonshot.cn/v1}
      WORKBENCH_DATA_FILE: /data/workbench.json
      WRANGLER_LOG_PATH: /tmp/wrangler.log
    volumes:
      - ../ai-workbench-data:/data
    init: true
